<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenta-Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Moderna, mjuka SaaS-färger */
            --bg-app: #fcfcfd;
            --bg-surface: #ffffff;
            --border: #e4e4e7;
            --border-hover: #d4d4d8;

            --text-main: #18181b;
            --text-muted: #71717a;
            --text-light: #a1a1aa;

            --primary: #18181b;
            --primary-hover: #27272a;
            --row-hover: #f4f4f5;

            /* Subtila pasteller för uppgifterna */
            --c-green: #dcfce7;
            --c-green-border: #bbf7d0;
            --c-yellow: #fef08a;
            --c-yellow-border: #fde047;
            --c-red: #fee2e2;
            --c-red-border: #fecaca;

            /* Starkare färger för progress bar */
            --p-green: #22c55e;
            --p-yellow: #eab308;
            --p-red: #ef4444;
            --p-empty: #f4f4f5;

            /* UI Variabler */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -1px rgb(0 0 0 / 0.06);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hidden {
            display: none !important;
        }

        /* --- HEADER --- */
        header {
            background: var(--bg-surface);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        /* --- DRIVE VIEW --- */
        #driveView {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 40px 24px;
        }

        .breadcrumbs {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .breadcrumb-link {
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all 0.15s ease;
        }

        .breadcrumb-link:hover {
            background: var(--row-hover);
            color: var(--text-main);
        }

        .breadcrumb-current {
            color: var(--text-main);
            padding: 4px 8px;
        }

        .breadcrumb-separator {
            color: var(--text-light);
            user-select: none;
        }

        /* Ny Toolbar Layout */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .toolbar-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .toolbar-actions {
            display: flex;
            gap: 12px;
        }

        /* --- FORMS & BUTTONS --- */
        input[type="text"],
        textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-main);
            background: var(--bg-surface);
            transition: all 0.2s ease;
            outline: none;
            box-shadow: var(--shadow-sm);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--text-light);
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #a1a1aa;
            box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.05);
        }

        .btn {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.85rem;
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--row-hover);
            border-color: var(--border-hover);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-full {
            width: 100%;
            padding: 10px;
            margin-top: 16px;
            margin-bottom: 40px;
        }

        /* --- MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-surface);
            width: 100%;
            max-width: 400px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.2s ease;
            overflow: hidden;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
            border-radius: 4px;
            display: flex;
            transition: background 0.15s;
        }

        .modal-close:hover {
            background: #e4e4e7;
            color: var(--text-main);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* --- LIST VY --- */
        .drive-list {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s ease;
        }

        .drive-list.dragover {
            background: #f4f4f5;
            border-color: #a1a1aa;
            border-style: dashed;
        }

        .list-header {
            display: flex;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #fafafa;
        }

        .list-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            background: var(--bg-surface);
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .list-row:hover {
            background: var(--row-hover);
        }

        .row-icon {
            margin-right: 16px;
            display: flex;
            align-items: center;
            color: var(--text-light);
        }

        .row-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .row-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        /* --- Ikoner --- */
        svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* --- MINI TRACKER (List) --- */
        .mini-tracker {
            display: flex;
            gap: 3px;
            height: 6px;
            width: 64px;
            border-radius: 3px;
            overflow: hidden;
        }

        .mini-segment {
            flex: 1;
            border-radius: 2px;
        }

        /* --- SPLIT-SCREEN VY --- */
        #pdfView {
            display: flex;
            flex: 1;
            height: calc(100vh - 53px);
            overflow: hidden;
            background: #f4f4f5;
        }

        .left-panel {
            width: 65%;
            border-right: 1px solid var(--border);
            background: #e4e4e7;
        }

        .right-panel {
            width: 35%;
            overflow-y: auto;
            padding: 32px;
            background: var(--bg-app);
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- SIDEBAR COMPONENTS --- */
        .sidebar-header {
            margin-bottom: 24px;
        }

        .tenta-title {
            font-size: 1.1rem;
            margin: 0 0 4px 0;
            font-weight: 600;
        }

        /* Stats Box */
        .stats-box {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .stats-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .progress-bar-lg {
            display: flex;
            gap: 4px;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .progress-segment-lg {
            flex: 1;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            background: var(--bg-surface);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        /* Question Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        .card h4 {
            margin: 0 0 16px 0;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 64px;
            resize: vertical;
            margin-top: 8px;
            margin-bottom: 16px;
        }

        input[type="text"].full-width {
            width: 100%;
        }

        /* Color Picker Buttons */
        .color-picker {
            display: flex;
            gap: 8px;
        }

        .color-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--text-main);
            background: var(--bg-surface);
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .color-btn:hover {
            filter: brightness(0.95);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Tenta-Tracker</h1>
        <button id="globalBackBtn" class="btn hidden" onclick="goBack()">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Tillbaka till menyn
        </button>
    </header>

    <div id="driveView">
        <div class="breadcrumbs" id="breadcrumbsContainer">
        </div>

        <div class="toolbar">
            <div id="currentFolderTitle" class="toolbar-title">Min enhet</div>

            <div class="toolbar-actions">
                <button class="btn" onclick="openFolderModal()">
                    <svg viewBox="0 0 24 24">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                        <line x1="12" y1="11" x2="12" y2="17" />
                        <line x1="9" y1="14" x2="15" y2="14" />
                    </svg>
                    Ny mapp
                </button>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    Ladda upp PDF
                </button>
            </div>
            <input type="file" id="fileInput" accept=".pdf" multiple>
        </div>

        <div class="drive-list" id="driveList">
        </div>
    </div>

    <div id="pdfView" class="hidden">
        <div class="left-panel"><iframe id="pdfFrame"></iframe></div>

        <div class="right-panel">
            <div class="sidebar-header">
                <h2 id="currentTentaTitle" class="tenta-title"></h2>
            </div>

            <div class="stats-box">
                <div class="stats-title">Framsteg</div>
                <div class="progress-bar-lg" id="progressBar">
                    <div id="seg1" class="progress-segment-lg" style="background-color: var(--p-empty);"></div>
                    <div id="seg2" class="progress-segment-lg" style="background-color: var(--p-empty);"></div>
                    <div id="seg3" class="progress-segment-lg" style="background-color: var(--p-empty);"></div>
                    <div id="seg4" class="progress-segment-lg" style="background-color: var(--p-empty);"></div>
                    <div id="seg5" class="progress-segment-lg" style="background-color: var(--p-empty);"></div>
                    <div id="seg6" class="progress-segment-lg" style="background-color: var(--p-empty);"></div>
                </div>
                <div id="localTagsContainer" class="tag-container"></div>
            </div>

            <div id="questionsContainer"></div>

            <button class="btn btn-primary btn-full" onclick="goBack()">Spara & Återgå</button>
        </div>
    </div>

    <div class="modal-overlay" id="folderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Skapa ny mapp</h3>
                <button class="modal-close" onclick="closeFolderModal()">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <label style="display:block; margin-bottom:8px; font-size:0.85rem; font-weight:500;">Mappnamn</label>
                <input type="text" id="modalFolderInput" style="width: 100%;" placeholder="T.ex. Algebra 2026"
                    onkeydown="if(event.key === 'Enter') confirmCreateFolder()">
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeFolderModal()">Avbryt</button>
                <button class="btn btn-primary" onclick="confirmCreateFolder()">Skapa</button>
            </div>
        </div>
    </div>

    <datalist id="globalKeywordList"></datalist>

    <script>
        // --- CONFIG & STATE ---
        let currentPath = [];
        let globalKeywords = JSON.parse(localStorage.getItem('tentaTracker_globalKeywords') || '[]');
        let currentFiles = [];
        let fileFolderMap = JSON.parse(localStorage.getItem('tentaTracker_fileFolderMap')) || {};
        let folders = JSON.parse(localStorage.getItem('tentaTracker_folders')) || [];

        const folderSvg = `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
        const fileSvg = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;
        const trashSvg = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`;

        function updateGlobalDatalist() {
            const datalist = document.getElementById('globalKeywordList');
            datalist.innerHTML = '';
            globalKeywords.forEach(word => {
                const option = document.createElement('option');
                option.value = word;
                datalist.appendChild(option);
            });
        }
        updateGlobalDatalist();

        function saveFolderData() {
            localStorage.setItem('tentaTracker_folders', JSON.stringify(folders));
            localStorage.setItem('tentaTracker_fileFolderMap', JSON.stringify(fileFolderMap));
        }

        // --- MODAL FUNKTIONER ---
        function openFolderModal() {
            document.getElementById('folderModal').classList.add('active');
            const input = document.getElementById('modalFolderInput');
            input.value = '';
            // Liten fördröjning så att modalen hinner visas innan input får fokus
            setTimeout(() => input.focus(), 100);
        }

        function closeFolderModal() {
            document.getElementById('folderModal').classList.remove('active');
        }

        function confirmCreateFolder() {
            const input = document.getElementById('modalFolderInput');
            const val = input.value.trim();

            if (val !== "") {
                const prefix = currentPath.length === 0 ? '' : currentPath.join('/') + '/';
                const newFolderPath = prefix + val;

                if (!folders.includes(newFolderPath)) {
                    folders.push(newFolderPath);
                    saveFolderData();
                    closeFolderModal();
                    renderDriveView();
                } else {
                    alert("En mapp med det namnet finns redan!");
                }
            } else {
                alert("Skriv ett namn på mappen först.");
            }
        }

        // --- RADERA FUNKTIONER ---
        function deleteFolder(fullPath, event) {
            event.stopPropagation();
            if (!confirm(`Är du säker på att du vill radera mappen och eventuellt innehåll inuti?`)) return;

            folders = folders.filter(f => f !== fullPath && !f.startsWith(fullPath + '/'));

            const filesToDelete = currentFiles.filter(f => {
                const mappedFolder = fileFolderMap[f.name] || "";
                return mappedFolder === fullPath || mappedFolder.startsWith(fullPath + '/');
            });

            filesToDelete.forEach(file => {
                currentFiles = currentFiles.filter(cf => cf.name !== file.name);
                delete fileFolderMap[file.name];
                clearFileData(file.name);
            });

            saveFolderData();
            renderDriveView();
        }

        function deleteFile(fileName, event) {
            event.stopPropagation();
            if (!confirm(`Är du säker på att du vill radera filen "${fileName}"?`)) return;

            currentFiles = currentFiles.filter(f => f.name !== fileName);
            delete fileFolderMap[fileName];
            clearFileData(fileName);
            saveFolderData();
            renderDriveView();
        }

        function clearFileData(fileName) {
            for (let i = 1; i <= 6; i++) {
                localStorage.removeItem(`${fileName}_q${i}_keyword`);
                localStorage.removeItem(`${fileName}_q${i}_notes`);
                localStorage.removeItem(`${fileName}_q${i}_color`);
            }
        }

        // --- NAVIGATION ---
        function navigateTo(level) {
            currentPath = currentPath.slice(0, level);
            renderDriveView();
        }

        function openFolder(folderName) {
            currentPath.push(folderName);
            renderDriveView();
        }

        // --- DRAG / DROP & FILER ---
        const fileInput = document.getElementById('fileInput');
        const driveList = document.getElementById('driveList');

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        ['dragenter', 'dragover'].forEach(eventName => {
            driveList.addEventListener(eventName, e => {
                e.preventDefault();
                driveList.classList.add('dragover');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            driveList.addEventListener(eventName, e => {
                e.preventDefault();
                driveList.classList.remove('dragover');
            });
        });

        driveList.addEventListener('drop', e => {
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            const currentPathString = currentPath.join('/');
            Array.from(files).forEach(file => {
                if (file.type === "application/pdf" || file.name.endsWith('.pdf')) {
                    if (!currentFiles.some(f => f.name === file.name)) {
                        currentFiles.push(file);
                    }
                    fileFolderMap[file.name] = currentPathString;
                }
            });
            saveFolderData();
            renderDriveView();
        }

        // --- RENDER FUNCTION ---
        function renderDriveView() {
            const breadcrumbsContainer = document.getElementById('breadcrumbsContainer');
            const titleEl = document.getElementById('currentFolderTitle');
            breadcrumbsContainer.innerHTML = '';

            const rootEl = document.createElement('span');
            rootEl.className = currentPath.length === 0 ? 'breadcrumb-current' : 'breadcrumb-link';
            rootEl.textContent = 'Min enhet';
            rootEl.onclick = () => navigateTo(0);
            breadcrumbsContainer.appendChild(rootEl);

            titleEl.textContent = currentPath.length === 0 ? 'Min enhet' : currentPath[currentPath.length - 1];

            currentPath.forEach((folderName, index) => {
                const sep = document.createElement('span');
                sep.className = 'breadcrumb-separator';
                sep.textContent = '/';
                breadcrumbsContainer.appendChild(sep);

                const crumb = document.createElement('span');
                crumb.className = (index === currentPath.length - 1) ? 'breadcrumb-current' : 'breadcrumb-link';
                crumb.textContent = folderName;
                crumb.onclick = () => navigateTo(index + 1);
                breadcrumbsContainer.appendChild(crumb);
            });

            const currentPathString = currentPath.join('/');
            const prefix = currentPath.length === 0 ? '' : currentPathString + '/';

            let subFolders = folders.filter(f => {
                if (currentPath.length === 0) return !f.includes('/');
                return f.startsWith(prefix) && f.slice(prefix.length).indexOf('/') === -1;
            });

            subFolders.sort((a, b) => b.localeCompare(a));

            let subFiles = currentFiles.filter(f => {
                const mappedFolder = fileFolderMap[f.name] || "";
                return mappedFolder === currentPathString;
            });

            driveList.innerHTML = `
                <div class="list-header">
                    <span style="flex: 1;">Namn</span>
                    <span style="width: 150px; text-align:right; padding-right:12px;">Status</span>
                </div>
            `;

            if (subFolders.length === 0 && subFiles.length === 0) {
                driveList.innerHTML += `<div style="padding: 64px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">Det är tomt här. Skapa en mapp eller ladda upp PDF-filer.</div>`;
                return;
            }

            // Rendera Mappar
            subFolders.forEach(fullPath => {
                const folderName = fullPath.split('/').pop();
                const row = document.createElement('div');
                row.className = 'list-row';
                row.onclick = () => openFolder(folderName);
                const safePath = fullPath.replace(/'/g, "\\'");
                row.innerHTML = `
                    <div class="row-icon">${folderSvg}</div>
                    <div class="row-name">${folderName}</div>
                    <div class="row-meta" style="padding-right:4px;">
                        —
                        <div class="action-btn" title="Radera mapp" onclick="deleteFolder('${safePath}', event)">${trashSvg}</div>
                    </div>
                `;
                driveList.appendChild(row);
            });

            // Rendera Filer
            subFiles.forEach(file => {
                let answered = 0;
                let segmentsHtml = '';

                for (let i = 1; i <= 6; i++) {
                    let col = localStorage.getItem(`${file.name}_q${i}_color`);
                    let color = 'var(--p-empty)';

                    if (col) answered++;
                    if (col === '#dcfce7') color = 'var(--p-green)';
                    if (col === '#fef08a') color = 'var(--p-yellow)';
                    if (col === '#fee2e2') color = 'var(--p-red)';

                    segmentsHtml += `<div class="mini-segment" style="background:${color};"></div>`;
                }

                const row = document.createElement('div');
                row.className = 'list-row';
                row.onclick = () => openTenta(file);
                const safeName = file.name.replace(/'/g, "\\'");
                row.innerHTML = `
                    <div class="row-icon">${fileSvg}</div>
                    <div class="row-name">${file.name}</div>
                    <div class="row-meta" style="padding-right:4px;">
                        <div class="mini-tracker">
                            ${segmentsHtml}
                        </div>
                        <span style="width: 32px; text-align: right; font-weight:500; font-variant-numeric: tabular-nums;">${answered}/6</span>
                        <div class="action-btn" title="Radera fil" onclick="deleteFile('${safeName}', event)">${trashSvg}</div>
                    </div>
                `;
                driveList.appendChild(row);
            });
        }

        // --- SPLIT SCREEN LOGIK ---
        function openTenta(file) {
            document.getElementById('pdfFrame').src = URL.createObjectURL(file);
            document.getElementById('currentTentaTitle').textContent = file.name;

            document.getElementById('driveView').classList.add('hidden');
            document.getElementById('pdfView').classList.remove('hidden');
            document.getElementById('globalBackBtn').classList.remove('hidden');

            renderQuestionCards(file.name);
        }

        function goBack() {
            document.getElementById('pdfView').classList.add('hidden');
            document.getElementById('globalBackBtn').classList.add('hidden');
            document.getElementById('driveView').classList.remove('hidden');
            document.getElementById('pdfFrame').src = "";
            renderDriveView();
        }

        function renderQuestionCards(tentaName) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= 6; i++) {
                const keyKeyword = `${tentaName}_q${i}_keyword`;
                const keyNotes = `${tentaName}_q${i}_notes`;
                const keyColor = `${tentaName}_q${i}_color`;

                const savedColor = localStorage.getItem(keyColor) || '';
                const savedKeyword = localStorage.getItem(keyKeyword) || '';
                const savedNotes = localStorage.getItem(keyNotes) || '';

                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card_q${i}`;

                if (savedColor) {
                    card.style.backgroundColor = savedColor;
                    if (savedColor === '#dcfce7') card.style.borderColor = 'var(--c-green-border)';
                    if (savedColor === '#fef08a') card.style.borderColor = 'var(--c-yellow-border)';
                    if (savedColor === '#fee2e2') card.style.borderColor = 'var(--c-red-border)';
                }

                card.innerHTML = `
                    <h4>Uppgift ${i}</h4>
                    <input type="text" class="full-width" list="globalKeywordList" placeholder="Område (t.ex. Derivata)" 
                           value="${savedKeyword}"
                           onchange="handleKeywordSave('${tentaName}', ${i}, this.value)">
                    <textarea placeholder="Dina anteckningar om uppgiften..." 
                              oninput="localStorage.setItem('${keyNotes}', this.value)">${savedNotes}</textarea>
                    <div class="color-picker">
                        <button class="color-btn" style="${savedColor === '#dcfce7' ? 'background:var(--c-green); border-color:var(--c-green-border); font-weight:600;' : ''}" 
                                onclick="saveColor('${tentaName}', ${i}, '#dcfce7')">Förstod</button>
                        <button class="color-btn" style="${savedColor === '#fef08a' ? 'background:var(--c-yellow); border-color:var(--c-yellow-border); font-weight:600;' : ''}" 
                                onclick="saveColor('${tentaName}', ${i}, '#fef08a')">Osäker</button>
                        <button class="color-btn" style="${savedColor === '#fee2e2' ? 'background:var(--c-red); border-color:var(--c-red-border); font-weight:600;' : ''}" 
                                onclick="saveColor('${tentaName}', ${i}, '#fee2e2')">Svårt</button>
                    </div>
                `;
                container.appendChild(card);
            }
            updateStatsAndTags(tentaName);
        }

        function handleKeywordSave(tentaName, index, value) {
            const trimmedValue = value.trim();
            localStorage.setItem(`${tentaName}_q${index}_keyword`, trimmedValue);

            if (trimmedValue !== '' && !globalKeywords.includes(trimmedValue)) {
                globalKeywords.push(trimmedValue);
                localStorage.setItem('tentaTracker_globalKeywords', JSON.stringify(globalKeywords));
                updateGlobalDatalist();
            }
            updateStatsAndTags(tentaName);
        }

        function saveColor(tentaName, index, color) {
            localStorage.setItem(`${tentaName}_q${index}_color`, color);
            renderQuestionCards(tentaName);
        }

        function updateStatsAndTags(tentaName) {
            const tagsContainer = document.getElementById('localTagsContainer');
            if (!tagsContainer) return;
            tagsContainer.innerHTML = '';

            let localKeywords = new Set();
            const colorMap = {
                '#dcfce7': 'var(--p-green)',
                '#fef08a': 'var(--p-yellow)',
                '#fee2e2': 'var(--p-red)'
            };

            for (let i = 1; i <= 6; i++) {
                const kw = localStorage.getItem(`${tentaName}_q${i}_keyword`);
                const col = localStorage.getItem(`${tentaName}_q${i}_color`);

                if (kw && kw.trim() !== '') localKeywords.add(kw.trim());

                const segment = document.getElementById(`seg${i}`);
                if (segment) {
                    segment.style.backgroundColor = col ? colorMap[col] : 'var(--p-empty)';
                }
            }

            if (localKeywords.size === 0) {
                tagsContainer.innerHTML = '<span style="color:var(--text-light); font-size:0.75rem;">Inga områden ifyllda ännu...</span>';
            } else {
                localKeywords.forEach(word => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = word;
                    tagsContainer.appendChild(span);
                });
            }
        }

        // Kör vid start
        renderDriveView();
    </script>
</body>

</html>
